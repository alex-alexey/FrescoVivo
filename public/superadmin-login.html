<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:   #0D0D0C;
  --card: #161614;
  --b1:   #2A2A27;
  --b2:   #3A3A36;
  --t1:   #F0EEE8;
  --t2:   #78776E;
  --t3:   #4A4A45;
  --green: #22C55E;
  --red:   #EF4444;
  --ff: 'DM Sans', system-ui, sans-serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html, body { height: 100%; }
body {
  font-family: var(--ff); background: var(--bg); color: var(--t1);
  display: flex; align-items: center; justify-content: center;
  min-height: 100%; -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 24px 24px;
}

.wrap {
  width: 100%; max-width: 360px;
  padding: 1.25rem;
  animation: up .45s var(--ease) both;
}
@keyframes up {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}

.mark {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 2rem;
}
.mark svg { width: 18px; height: 18px; stroke: var(--t2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.alert {
  display: none; padding: .65rem .85rem; border-radius: 8px;
  font-size: .75rem; margin-bottom: 1.1rem; line-height: 1.5;
  align-items: center; gap: .5rem;
}
.alert.show { display: flex; animation: alertIn .2s var(--ease); }
@keyframes alertIn { from { opacity: 0; transform: translateY(-4px); } to { opacity:1; transform:none; } }
.alert-error   { background: rgba(239,68,68,.08);  color: #FCA5A5; border: 1px solid rgba(239,68,68,.2); }
.alert-success { background: rgba(34,197,94,.08);  color: #86EFAC; border: 1px solid rgba(34,197,94,.2); }
.alert-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.alert-error   .alert-dot { background: var(--red); }
.alert-success .alert-dot { background: var(--green); }

.field { margin-bottom: .85rem; }
.field label {
  display: block; font-size: .62rem; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--t3); margin-bottom: .38rem;
}
.input-wrap { position: relative; }
.input-wrap input {
  width: 100%; padding: .76rem 1rem; padding-right: 2.6rem;
  border: 1px solid var(--b1); border-radius: 8px;
  background: var(--card); color: var(--t1);
  font-family: var(--ff); font-size: .86rem;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.input-wrap input::placeholder { color: var(--t3); }
.input-wrap input:focus {
  border-color: var(--b2);
  box-shadow: 0 0 0 3px rgba(255,255,255,.04);
}
.input-wrap input.err { border-color: rgba(239,68,68,.5); }
.input-wrap input.err:focus { box-shadow: 0 0 0 3px rgba(239,68,68,.06); }

.pwd-toggle {
  position: absolute; right: .8rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--t3);
  display: flex; align-items: center; padding: .2rem;
  transition: color .15s;
}
.pwd-toggle:hover { color: var(--t2); }
.pwd-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

.btn {
  width: 100%; padding: .8rem; margin-top: .3rem;
  background: var(--t1); color: var(--bg); border: none;
  border-radius: 8px; font-family: var(--ff); font-size: .84rem;
  font-weight: 600; cursor: pointer; letter-spacing: -.01em;
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  transition: all .2s var(--ease);
}
.btn:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
.btn:active:not(:disabled) { transform: none; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.spinner {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(13,13,12,.2);
  border-top-color: var(--bg);
  animation: spin .7s linear infinite; display: none; flex-shrink: 0;
}
.btn.loading .spinner { display: block; }
.btn.loading .btn-label { opacity: .6; }
@keyframes spin { to { transform: rotate(360deg); } }

.attempts {
  margin-top: 1.4rem; text-align: center;
  font-size: .62rem; color: var(--t3); letter-spacing: .04em; line-height: 1.8;
}
.attempts span { color: var(--t2); }
</style>
</head>
<body>
<div class="wrap">

  <div class="mark">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <div class="alert" id="alert">
    <span class="alert-dot"></span>
    <span id="alert-msg"></span>
  </div>

  <form id="form" novalidate autocomplete="off">

    <div class="field">
      <label for="username">Identificador</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username"
          placeholder="—" autofocus autocomplete="off" spellcheck="false"/>
      </div>
    </div>

    <div class="field">
      <label for="password">Clave</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password"
          placeholder="—" autocomplete="off"/>
        <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar">
          <svg id="ico-eye" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="ico-eye-off" viewBox="0 0 24 24" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn">
      <div class="spinner"></div>
      <span class="btn-label">Continuar</span>
    </button>

  </form>

  <p class="attempts" id="attemptsNote" style="display:none">
    Intentos restantes: <span id="attemptsLeft">3</span>
  </p>

</div>

<script>
const form      = document.getElementById('form');
const btn       = document.getElementById('btn');
const alertBox  = document.getElementById('alert');
const alertMsg  = document.getElementById('alert-msg');
const pwdToggle = document.getElementById('pwdToggle');
const pwdInput  = document.getElementById('password');
const userInput = document.getElementById('username');
const attNote   = document.getElementById('attemptsNote');
const attLeft   = document.getElementById('attemptsLeft');
const icoEye    = document.getElementById('ico-eye');
const icoEyeOff = document.getElementById('ico-eye-off');

let attempts = 0;
const MAX = 5;
let blocked = false;

pwdToggle.addEventListener('click', () => {
  const show = pwdInput.type === 'password';
  pwdInput.type = show ? 'text' : 'password';
  icoEye.style.display    = show ? 'none'  : 'block';
  icoEyeOff.style.display = show ? 'block' : 'none';
});

function showAlert(msg, type = 'error') {
  alertMsg.textContent = msg;
  alertBox.className = 'alert show alert-' + type;
  if (type === 'error') setTimeout(() => alertBox.classList.remove('show'), 6000);
}

function setLoading(on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

[userInput, pwdInput].forEach(el => {
  el.addEventListener('input', () => {
    el.classList.remove('err');
    alertBox.classList.remove('show');
  });
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (blocked) return;

  const username = userInput.value.trim();
  const password = pwdInput.value;

  let hasErr = false;
  if (!username) { userInput.classList.add('err'); hasErr = true; }
  if (!password) { pwdInput.classList.add('err');  hasErr = true; }
  if (hasErr) return;

  setLoading(true);

  // Minimum delay prevents timing attacks
  const minDelay = new Promise(r => setTimeout(r, 600));

  try {
    const [res] = await Promise.all([
      fetch('/api/auth/superadmin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      }),
      minDelay
    ]);

    const data = await res.json();

    if (data.success) {
      showAlert('Acceso concedido.', 'success');
      setTimeout(() => { window.location.href = '/superadmin'; }, 900);
    } else {
      throw new Error();
    }

  } catch {
    attempts++;
    const remaining = MAX - attempts;

    if (attempts >= MAX) {
      blocked = true;
      btn.disabled = true;
      showAlert('Acceso bloqueado temporalmente.');
      attNote.style.display = 'none';
      setTimeout(() => {
        blocked = false; attempts = 0;
        btn.disabled = false;
        attNote.style.display = 'none';
        alertBox.classList.remove('show');
      }, 30000);
    } else {
      // Never reveal whether user or password was wrong
      showAlert('Credenciales incorrectas.');
      if (attempts >= 2) {
        attNote.style.display = 'block';
        attLeft.textContent = remaining;
      }
    }

    pwdInput.value = '';
    pwdInput.focus();
    setLoading(false);
  }
});
</script>
</body>
</html>
